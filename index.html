<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pherd Sus - Crossplay Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0d0d0d; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none; touch-action: none; /* Crucial for mobile */
        }

        #ui-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { background-color: #0d0e12; display: block; cursor: crosshair; }

        /* Dashboard for PC */
        #dashboard {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
            border: 2px solid #334155; border-radius: 12px; display: flex;
            justify-content: space-around; align-items: center; padding: 14px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 20; backdrop-filter: blur(4px); gap: 20px; white-space: nowrap;
        }

        .key-cap { background-color: #334155; border: 1px solid #475569; border-radius: 4px; padding: 3px 8px; font-weight: bold; color: #f1f5f9; box-shadow: 0 2px 0 #020617; }

        /* Overlays */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 30;
        }
        .hidden { display: none !important; }

        h2 { font-size: 32px; color: #ffd700; margin-bottom: 25px; text-shadow: 0 4px 0 #000; text-align: center; padding: 0 15px;}
        
        .btn {
            background-color: #d32f2f; color: white; border: 2px solid white;
            padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .choices-container { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; max-width: 95%; }
        .card {
            background: linear-gradient(135deg, #1e293b, #0f172a); border: 2px solid #f1c40f;
            border-radius: 14px; width: 140px; padding: 15px 10px; text-align: center;
            cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }
        .card-icon { font-size: 40px; margin-bottom: 5px; }
        .card-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #fff;}
        .card-desc { font-size: 11px; color: #94a3b8; line-height: 1.2; }
    </style>
</head>
<body>

<div id="dashboard">
    <div><span class="key-cap">W</span><span class="key-cap">A</span><span class="key-cap">S</span><span class="key-cap">D</span> <b>Move</b></div>
    <div>🖱️ <b>Scroll:</b> Zoom Camera</div>
    <div>🎮 <b>Game Controls</b></div>
</div>

<div id="ui-container">
    <div id="gameover-screen" class="overlay hidden">
        <h2 id="gameover-title">Social Battery Fully Drained!</h2>
        <p id="gameover-stats" style="font-size: 18px; margin-bottom: 10px; color: #94a3b8; text-align: center;"></p>
        <p id="gameover-score" style="font-size: 24px; font-weight: bold; margin-bottom: 25px; color: #4ade80;"></p>
        <button class="btn" onclick="resetGame()">Try Re-Isolating</button>
    </div>

    <div id="levelup-screen" class="overlay hidden">
        <h2>🎉 Level Up! Choose an Upgrade 🎉</h2>
        <div class="choices-container" id="choices-box"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- DEVICE DETECTION ---
    // Checks if the device has a touch screen or is running a mobile browser
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);

    // Hide the PC dashboard if on a mobile phone to save screen space
    if (isMobile) {
        document.getElementById('dashboard').style.display = 'none';
    }

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() { canvas.width = window.innerWidth; canvas.height = window.innerHeight; }
    window.addEventListener('resize', resizeCanvas); resizeCanvas();

    const WORLD_WIDTH = 10240; const WORLD_HEIGHT = 7680;
    let zoom = 1.0;

    // --- CONTROLS ---
    let keys = {};
    let joystickData = { active: false, id: null, startX: 0, startY: 0, currentX: 0, currentY: 0, dx: 0, dy: 0 };
    let initialPinchDist = null;

    // PC Keyboard
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // PC Mouse Scroll
    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        zoom += e.deltaY < 0 ? 0.1 : -0.1;
        zoom = Math.max(0.2, Math.min(2.5, zoom));
    }, { passive: false });

    // Mobile Touch
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (e.touches.length === 2) initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        
        for (let i = 0; i < e.touches.length; i++) {
            let t = e.touches[i];
            if (t.clientX < window.innerWidth && !joystickData.active) {
                joystickData.active = true; joystickData.id = t.identifier;
                joystickData.startX = t.clientX; joystickData.startY = t.clientY;
                joystickData.currentX = t.clientX; joystickData.currentY = t.clientY;
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 2 && initialPinchDist) {
            let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            zoom += (dist - initialPinchDist) * 0.005; 
            zoom = Math.max(0.2, Math.min(2.5, zoom));
            initialPinchDist = dist;
        }

        for (let i = 0; i < e.touches.length; i++) {
            let t = e.touches[i];
            if (joystickData.active && t.identifier === joystickData.id) {
                joystickData.currentX = t.clientX; joystickData.currentY = t.clientY;
                let diffX = t.clientX - joystickData.startX; let diffY = t.clientY - joystickData.startY;
                let dist = Math.hypot(diffX, diffY);
                if (dist > 0) { joystickData.dx = diffX / dist * Math.min(dist / 50, 1); joystickData.dy = diffY / dist * Math.min(dist / 50, 1); }
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        if (e.touches.length < 2) initialPinchDist = null;
        let stillTouching = false;
        for (let i = 0; i < e.touches.length; i++) if (e.touches[i].identifier === joystickData.id) stillTouching = true;
        if (!stillTouching) { joystickData.active = false; joystickData.id = null; joystickData.dx = 0; joystickData.dy = 0; }
    }, {passive: false});


    // --- IMAGE SYSTEM ---
    const imageFiles = { player1: 'player1', player2: 'player2', player3: 'player3', enemy1: 'friend1', enemy2: 'friend2', enemy3: 'friend3', enemy4: 'friend4', enemy5: 'friend5', boss: 'boss', secretBoss1: 'secretboss1', secretBoss2: 'secretboss2', dog: 'dog', bigdog: 'bigdog', weapon: 'weapon', pizza: 'pizza' };
    const images = {};
    Object.keys(imageFiles).forEach(key => {
        const img = new Image(); img.triedJpg = false; img.src = 'images/' + imageFiles[key] + '.png';
        img.onerror = () => { if (!img.triedJpg) { img.triedJpg = true; img.src = 'images/' + imageFiles[key] + '.jpg'; } };
        images[key] = img;
    });

    function drawSprite(imgElement, fallbackEmoji, x, y, size) {
        if (imgElement && imgElement.complete && imgElement.naturalWidth > 0) ctx.drawImage(imgElement, x - size / 2, y - size / 2, size, size);
        else { ctx.font = `${size}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(fallbackEmoji, x, y); }
    }


    // --- GAME LOGIC & CLASSES ---
    let player, enemies, projectiles, gems, particles, pulses, chests, bossPulses, bossProjectiles;
    let gameActive = true, gameTime = 0, spawnTimer = 0, levelUpActive = false, bossTimer = 0, playerScore = 0, chestNotifyTimer = 0, chestNotifyText = "";

    function triggerNotify(text, duration = 180) { chestNotifyText = text; chestNotifyTimer = duration; }

    class Player {
        constructor() {
            this.x = WORLD_WIDTH / 2; this.y = WORLD_HEIGHT / 2; this.radius = 36; this.speed = 3.6; this.hp = 100; this.maxHp = 100;
            this.level = 1; this.xp = 0; this.nextXp = 10;
            this.upgrades = { dog: 1, bigdog: 0, stick: 0, coffee: 0, wifi: 0, pizza: 0, shield: 0, magnet: 0, clock: 0 };
            this.timers = { dog: 0, bigdog: 0, wifi: 0 }; this.stickAngle = 0;
        }
        update() {
            let speed = this.speed + (this.upgrades.coffee * 0.5);
            let dx = 0; let dy = 0;

            // PC Input
            if (keys['w'] || keys['ArrowUp']) dy = -1; if (keys['s'] || keys['ArrowDown']) dy = 1;
            if (keys['a'] || keys['ArrowLeft']) dx = -1; if (keys['d'] || keys['ArrowRight']) dx = 1;
            
            // Mobile Input overrides PC input if joystick is touched
            if (joystickData.active) {
                dx = joystickData.dx; dy = joystickData.dy;
            } else if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; } // Normalize PC diagonal

            this.x = Math.max(35, Math.min(WORLD_WIDTH - 35, this.x + dx * speed));
            this.y = Math.max(35, Math.min(WORLD_HEIGHT - 35, this.y + dy * speed));

            if (this.upgrades.pizza > 0 && this.hp < this.maxHp) this.hp = Math.min(this.maxHp, this.hp + (0.006 * this.upgrades.pizza));

            let cdMult = Math.max(0.4, 1 - (this.upgrades.clock * 0.08));
            this.timers.dog++;
            if (this.timers.dog >= Math.max(15, (70 - (this.upgrades.dog * 8)) * cdMult) && enemies.length > 0) {
                this.timers.dog = 0; let target = enemies.reduce((min, e) => Math.hypot(e.x-this.x, e.y-this.y) < Math.hypot(min.x-this.x, min.y-this.y) ? e : min, enemies[0]);
                projectiles.push(new DogProjectile(this.x, this.y, target, this.upgrades.dog));
            }
        }
        draw() {
            drawSprite(this.level >= 10 ? images.player3 : (this.level >= 5 ? images.player2 : images.player1), this.level >= 10 ? "👑" : "🧑‍🌾", this.x, this.y, 96);
            if (this.upgrades.stick > 0) {
                this.stickAngle += 0.04;
                for(let i=0; i<this.upgrades.stick; i++) {
                    let sx = this.x + Math.cos(this.stickAngle + (Math.PI*2/this.upgrades.stick)*i) * (100 + this.upgrades.stick*5);
                    let sy = this.y + Math.sin(this.stickAngle + (Math.PI*2/this.upgrades.stick)*i) * (100 + this.upgrades.stick*5);
                    drawSprite(images.weapon, "🦯", sx, sy, 64);
                    enemies.forEach(e => { if(Math.hypot(e.x-sx, e.y-sy) < 40) e.takeDamage(0.4 * (1 + this.upgrades.stick * 0.1)); });
                }
            }
            let hpx = this.x - 45; let hpy = this.y + 60;
            ctx.fillStyle = "#1e293b"; ctx.fillRect(hpx, hpy, 90, 12);
            ctx.fillStyle = (this.hp/this.maxHp) > 0.4 ? "#10b981" : "#ef4444"; ctx.fillRect(hpx, hpy, 90 * Math.max(0, this.hp/this.maxHp), 12);
            ctx.strokeStyle = "#000"; ctx.lineWidth = 1.5; ctx.strokeRect(hpx, hpy, 90, 12);
        }
        gainXp(amt) {
            this.xp += amt;
            if (this.xp >= this.nextXp) {
                this.xp -= this.nextXp; this.level++;
                this.nextXp = this.level > 15 ? Math.floor(this.nextXp * 1.8) + 120 : Math.floor(this.nextXp * 1.35) + 6;
                triggerLevelUp();
            }
        }
    }

    class FriendEnemy {
        constructor(x, y, t) { this.x=x; this.y=y; this.imgKey=t.imgKey; this.fallback=t.fallback; this.hp=t.hp; this.maxHp=t.hp; this.speed=t.speed; this.xpReward=t.xp; this.radius=t.radius||30; this.isBoss=t.isBoss; this.name=t.name; }
        update() {
            let angle = Math.atan2(player.y - this.y, player.x - this.x);
            this.x += Math.cos(angle) * this.speed; this.y += Math.sin(angle) * this.speed;
            if (Math.hypot(player.x - this.x, player.y - this.y) < player.radius + this.radius) {
                player.hp -= (this.isBoss ? 0.8 : 0.3) * (1 - Math.min(0.8, player.upgrades.shield * 0.12));
                if (player.hp <= 0) endGame();
            }
        }
        draw() {
            drawSprite(images[this.imgKey], this.fallback, this.x, this.y, this.isBoss ? 160 : 80);
            if(this.hp < this.maxHp && !this.isBoss) { ctx.fillStyle = "#475569"; ctx.fillRect(this.x-20, this.y-48, 40, 6); ctx.fillStyle = "#ef4444"; ctx.fillRect(this.x-20, this.y-48, 40*(this.hp/this.maxHp), 6); }
        }
        takeDamage(amt) {
            this.hp -= amt;
            if (this.hp <= 0) {
                playerScore += this.isBoss ? 1500 : this.xpReward * 10;
                if (this.isBoss) {
                    chests.push(new Chest(this.x, this.y)); for(let i=0; i<12; i++) gems.push(new Gem(this.x+(Math.random()-0.5)*140, this.y+(Math.random()-0.5)*140, 20));
                    triggerNotify("🏆 BOSS DEFEATED!");
                } else { gems.push(new Gem(this.x, this.y, this.xpReward)); if(Math.random()<0.05) chests.push(new Chest(this.x, this.y)); }
                enemies = enemies.filter(e => e !== this);
            }
        }
    }

    class DogProjectile {
        constructor(x, y, target, level) { this.x=x; this.y=y; this.target=target; this.speed=6+level; this.damage=5+(level*3.5); this.radius=24; this.life=180; }
        update() {
            this.life--;
            if (enemies.includes(this.target)) {
                let angle = Math.atan2(this.target.y - this.y, this.target.x - this.x);
                this.x += Math.cos(angle) * this.speed; this.y += Math.sin(angle) * this.speed;
            } else this.x += this.speed;
        }
        draw() { drawSprite(images.dog, "🐕", this.x, this.y, 56); }
    }

    class Gem {
        constructor(x,y,val){this.x=x;this.y=y;this.val=val;}
        update() {
            let dist = Math.hypot(player.x-this.x, player.y-this.y);
            if(dist < 150 + (player.upgrades.magnet * 60)) { let angle=Math.atan2(player.y-this.y, player.x-this.x); this.x+=Math.cos(angle)*8; this.y+=Math.sin(angle)*8; }
            if(dist < player.radius + 5) { player.gainXp(this.val); gems=gems.filter(g=>g!==this); }
        }
        draw() { drawSprite(images.pizza, "🍕", this.x, this.y, 48); }
    }

    class Chest {
        constructor(x,y){this.x=x;this.y=y;this.pulse=0;}
        update() {
            this.pulse+=0.05; let dist = Math.hypot(player.x-this.x, player.y-this.y);
            if(dist < 180 + (player.upgrades.magnet * 60)) { let angle=Math.atan2(player.y-this.y, player.x-this.x); this.x+=Math.cos(angle)*9; this.y+=Math.sin(angle)*9; }
            if(dist < player.radius + 15) { openChest(); chests=chests.filter(c=>c!==this); }
        }
        draw() {
            ctx.strokeStyle = `rgba(241,196,15,${0.3+Math.sin(this.pulse)*0.2})`; ctx.lineWidth=4; ctx.beginPath(); ctx.arc(this.x, this.y, 35+Math.sin(this.pulse)*5, 0, Math.PI*2); ctx.stroke();
            drawSprite(null, "📦", this.x, this.y, 50);
        }
    }

    function openChest() {
        let keys = Object.keys(player.upgrades); player.upgrades[keys[Math.floor(Math.random()*keys.length)]]++;
        triggerNotify("🎁 You picked up a Chest Upgrade!"); playerScore+=500;
    }

    const enemyPool = [
        { imgKey: "enemy1", fallback: "🙋‍♂️", hp: 8, speed: 1.3, xp: 1, minLevel: 1 },  
        { imgKey: "enemy2", fallback: "🏃‍♂️", hp: 15, speed: 2.0, xp: 2, minLevel: 3 }, 
        { imgKey: "enemy4", fallback: "🤗", hp: 10, speed: 2.7, xp: 2, minLevel: 5 }
    ];

    function spawnEnemy() {
        if(++spawnTimer >= 40) {
            spawnTimer = 0;
            let a=Math.random()*Math.PI*2, d=750/zoom, x=Math.max(40,Math.min(WORLD_WIDTH-40,player.x+Math.cos(a)*d)), y=Math.max(40,Math.min(WORLD_HEIGHT-40,player.y+Math.sin(a)*d));
            let type = enemyPool[Math.floor(Math.random()*enemyPool.length)];
            enemies.push(new FriendEnemy(x,y,{...type, hp: Math.round(type.hp*(1+(player.level*0.1))), speed: type.speed*(1+(player.level*0.02))}));
        }
    }

    function resetGame() {
        player = new Player(); enemies = []; projectiles = []; gems = []; chests = [];
        gameTime = 0; spawnTimer = 0; playerScore = 0; gameActive = true; levelUpActive = false;
        document.getElementById('gameover-screen').classList.add('hidden'); document.getElementById('levelup-screen').classList.add('hidden');
    }

    function triggerLevelUp() {
        levelUpActive = true; document.getElementById('levelup-screen').classList.remove('hidden');
        const pool = [
            { id: 'dog', title: 'Shepherd Dog', desc: 'More dog attacks', icon: '🐕' },
            { id: 'stick', title: 'Herding Crook', desc: 'Adds spinning stick', icon: '🦯' },
            { id: 'coffee', title: 'Coffee', desc: 'Move faster', icon: '☕' },
            { id: 'pizza', title: 'Pizza', desc: 'Health Regen', icon: '🍕' }
        ].sort(() => 0.5 - Math.random());
        
        let box = document.getElementById('choices-box'); box.innerHTML = "";
        pool.slice(0, 3).forEach(u => {
            let c = document.createElement('div'); c.className = "card"; c.onclick = () => { player.upgrades[u.id]++; levelUpActive=false; document.getElementById('levelup-screen').classList.add('hidden'); };
            c.innerHTML = `<div class="card-icon">${u.icon}</div><div class="card-title">${u.title}</div><div class="card-desc">${u.desc}</div>`; box.appendChild(c);
        });
    }

    function endGame() {
        gameActive = false; document.getElementById('gameover-screen').classList.remove('hidden');
        document.getElementById('gameover-stats').innerText = `Survived for ${Math.floor(gameTime/60)}:${Math.floor(gameTime%60).toString().padStart(2,'0')} and hit level ${player.level}!`;
        document.getElementById('gameover-score').innerText = `Final Score: ${playerScore}`;
    }

    function drawMobileJoystick() {
        if (isMobile && joystickData.active) {
            ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset to screen space
            
            // Draw outer base
            ctx.beginPath(); ctx.arc(joystickData.startX, joystickData.startY, 50, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.1)"; ctx.fill();
            ctx.strokeStyle = "rgba(255, 255, 255, 0.4)"; ctx.lineWidth = 2; ctx.stroke();
            
            // Draw inner thumbstick
            ctx.beginPath(); ctx.arc(joystickData.startX + joystickData.dx * 30, joystickData.startY + joystickData.dy * 30, 25, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255, 255, 255, 0.5)"; ctx.fill();
            
            ctx.restore();
        }
    }

    function gameLoop() {
        if (!gameActive || levelUpActive) { if(gameActive) requestAnimationFrame(gameLoop); return; }
        gameTime += 1/60; if(Math.floor(gameTime*60)%60===0) playerScore+=5;
        
        player.update(); spawnEnemy();
        projectiles.forEach(p => { p.update(); enemies.forEach(e => { if(Math.hypot(e.x-p.x, e.y-p.y) < e.radius+p.radius) { e.takeDamage(p.damage); p.life=0; } }); });
        projectiles = projectiles.filter(p => p.life > 0);
        enemies.forEach(e => e.update()); gems.forEach(g => g.update()); chests.forEach(c => c.update());

        ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        ctx.translate(canvas.width/2, canvas.height/2); ctx.scale(zoom, zoom); ctx.translate(-player.x, -player.y);
        ctx.fillStyle = "#2d5a1e"; ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT); // Grass
        
        // Grid
        ctx.strokeStyle="rgba(74,222,128,0.1)"; ctx.lineWidth=2; ctx.beginPath();
        for(let i=0; i<WORLD_WIDTH; i+=180) { ctx.moveTo(i,0); ctx.lineTo(i,WORLD_HEIGHT); }
        for(let i=0; i<WORLD_HEIGHT; i+=180) { ctx.moveTo(0,i); ctx.lineTo(WORLD_WIDTH,i); }
        ctx.stroke();

        gems.forEach(g=>g.draw()); chests.forEach(c=>c.draw()); projectiles.forEach(p=>p.draw()); enemies.forEach(e=>e.draw()); player.draw();
        ctx.restore();

        // HUD
        ctx.fillStyle = "#1e293b"; ctx.fillRect(0,0,canvas.width,24); ctx.fillStyle = "#3b82f6"; ctx.fillRect(0,0,canvas.width*(player.xp/player.nextXp),24);
        ctx.fillStyle = "white"; ctx.font = "bold 15px Arial"; ctx.textAlign="center"; ctx.textBaseline="middle"; ctx.fillText(`LV ${player.level}`, canvas.width/2, 12);
        ctx.font = "bold 32px Arial"; ctx.fillText(`${Math.floor(gameTime/60)}:${Math.floor(gameTime%60).toString().padStart(2,'0')}`, canvas.width/2, 62);
        ctx.textAlign="right"; ctx.font="bold 24px Arial"; ctx.fillStyle="#4ade80"; ctx.fillText(`Score: ${playerScore}`, canvas.width-20, 56);

        if(chestNotifyTimer-->0) {
            ctx.fillStyle="rgba(241,196,15,0.95)"; let bw=320, bh=40, bx=(canvas.width-bw)/2, by=80;
            ctx.fillRect(bx, by, bw, bh); ctx.fillStyle="#0f172a"; ctx.font="bold 15px Arial"; ctx.textAlign="center"; ctx.fillText(chestNotifyText, canvas.width/2, by+bh/2);
        }

        drawMobileJoystick(); // Draws only on mobile while touching
        requestAnimationFrame(gameLoop);
    }

    resetGame();
    requestAnimationFrame(gameLoop);
</script>
</body>
</html>
