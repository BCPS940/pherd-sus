<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pherd Sus - Mobile Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0d0d0d; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none; touch-action: none; /* Prevents mobile swipe-to-refresh */
        }

        #ui-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { background-color: #0d0e12; display: block; cursor: crosshair; }

        /* Dashboard (Hidden on mobile via media query, shown on PC) */
        #dashboard {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
            border: 2px solid #334155; border-radius: 12px; display: flex;
            justify-content: space-around; align-items: center; padding: 14px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 20; backdrop-filter: blur(4px);
            white-space: nowrap; gap: 20px;
        }

        .key-cap { background-color: #334155; border: 1px solid #475569; border-radius: 4px; padding: 3px 8px; font-weight: bold; color: #f1f5f9; }

        /* Overlays (Game Over / Level Up) */
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background-color: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column;
            align-items: center; justify-content: center; z-index: 30;
        }
        .hidden { display: none !important; }
        
        h2 { font-size: 32px; color: #ffd700; margin-bottom: 25px; text-shadow: 0 4px 0 #000; text-align: center;}
        
        .btn {
            background-color: #d32f2f; color: white; border: 2px solid white;
            padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer;
            border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.4);
        }

        .choices-container { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; max-width: 90%; }
        .card {
            background: linear-gradient(135deg, #1e293b, #0f172a); border: 2px solid #f1c40f;
            border-radius: 14px; width: 140px; padding: 15px 10px; text-align: center;
            cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.6);
        }
        .card-icon { font-size: 40px; margin-bottom: 5px; }
        .card-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #fff;}
        .card-desc { font-size: 11px; color: #94a3b8; line-height: 1.2; }

        @media (max-width: 768px) {
            #dashboard { display: none; } /* Hide dashboard on phones to save screen space */
        }
    </style>
</head>
<body>

<div id="dashboard">
    <div><span class="key-cap">W</span><span class="key-cap">A</span><span class="key-cap">S</span><span class="key-cap">D</span> <b>Move</b></div>
    <div>🖱️ <b>Scroll:</b> Zoom Camera</div>
    <div>📱 <b>Mobile:</b> Touch left screen to move, pinch to zoom</div>
</div>

<div id="ui-container">
    <div id="gameover-screen" class="overlay hidden">
        <h2 id="gameover-title">Social Battery Fully Drained!</h2>
        <p id="gameover-stats" style="font-size: 18px; margin-bottom: 10px; color: #94a3b8; text-align: center;"></p>
        <p id="gameover-score" style="font-size: 24px; font-weight: bold; margin-bottom: 25px; color: #4ade80;"></p>
        <button class="btn" onclick="resetGame()">Try Re-Isolating</button>
    </div>

    <div id="levelup-screen" class="overlay hidden">
        <h2>🎉 Level Up! 🎉</h2>
        <div class="choices-container" id="choices-box"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() {
        canvas.width = window.innerWidth;
        canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resizeCanvas);
    resizeCanvas();

    const WORLD_WIDTH = 10240;
    const WORLD_HEIGHT = 7680;
    let zoom = 1.0;

    // --- MOBILE TOUCH CONTROLS (Virtual Joystick & Pinch Zoom) ---
    let joystickData = { active: false, id: null, startX: 0, startY: 0, currentX: 0, currentY: 0, dx: 0, dy: 0 };
    let initialPinchDist = null;

    canvas.addEventListener('touchstart', (e) => {
        e.preventDefault();
        // Check for Pinch
        if (e.touches.length === 2) {
            initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
        
        // Check for Joystick (Left side of screen)
        for (let i = 0; i < e.touches.length; i++) {
            let touch = e.touches[i];
            if (touch.clientX < window.innerWidth / 2 && !joystickData.active) {
                joystickData.active = true;
                joystickData.id = touch.identifier;
                joystickData.startX = touch.clientX;
                joystickData.startY = touch.clientY;
                joystickData.currentX = touch.clientX;
                joystickData.currentY = touch.clientY;
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', (e) => {
        e.preventDefault();
        
        // Pinch to Zoom
        if (e.touches.length === 2 && initialPinchDist) {
            let currentDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            let distChange = currentDist - initialPinchDist;
            zoom += distChange * 0.005; 
            zoom = Math.max(0.2, Math.min(2.5, zoom)); // Clamp zoom between 20% and 250%
            initialPinchDist = currentDist;
        }

        // Virtual Joystick
        for (let i = 0; i < e.touches.length; i++) {
            let touch = e.touches[i];
            if (joystickData.active && touch.identifier === joystickData.id) {
                joystickData.currentX = touch.clientX;
                joystickData.currentY = touch.clientY;
                
                let diffX = joystickData.currentX - joystickData.startX;
                let diffY = joystickData.currentY - joystickData.startY;
                let dist = Math.hypot(diffX, diffY);
                let maxRadius = 50; // Size of invisible joystick
                
                if (dist > 0) {
                    joystickData.dx = diffX / dist * Math.min(dist / maxRadius, 1);
                    joystickData.dy = diffY / dist * Math.min(dist / maxRadius, 1);
                }
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchend', (e) => {
        e.preventDefault();
        if (e.touches.length < 2) initialPinchDist = null;
        
        let stillTouchingJoystick = false;
        for (let i = 0; i < e.touches.length; i++) {
            if (e.touches[i].identifier === joystickData.id) stillTouchingJoystick = true;
        }
        
        if (!stillTouchingJoystick) {
            joystickData.active = false;
            joystickData.id = null;
            joystickData.dx = 0;
            joystickData.dy = 0;
        }
    }, {passive: false});

    // PC Mouse Wheel Zoom
    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        zoom += e.deltaY < 0 ? 0.1 : -0.1;
        zoom = Math.max(0.2, Math.min(2.5, zoom));
    }, { passive: false });

    // --- PC KEYBOARD CONTROLS ---
    let keys = {};
    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    // --- GAME ENGINE AND LOGIC (Same as before, abridged for length but fully functional) ---
    const imageFiles = { player1: 'player1', player2: 'player2', player3: 'player3', enemy1: 'friend1', enemy2: 'friend2', enemy3: 'friend3', enemy4: 'friend4', enemy5: 'friend5', boss: 'boss', secretBoss1: 'secretboss1', secretBoss2: 'secretboss2', dog: 'dog', bigdog: 'bigdog', weapon: 'weapon', pizza: 'pizza' };
    const images = {};
    Object.keys(imageFiles).forEach(key => {
        const img = new Image(); img.triedJpg = false; img.src = 'images/' + imageFiles[key] + '.png';
        img.onerror = () => { if (!img.triedJpg) { img.triedJpg = true; img.src = 'images/' + imageFiles[key] + '.jpg'; } };
        images[key] = img;
    });

    function drawSprite(imgElement, fallbackEmoji, x, y, size) {
        if (imgElement && imgElement.complete && imgElement.naturalWidth > 0) ctx.drawImage(imgElement, x - size / 2, y - size / 2, size, size);
        else { ctx.font = `${size}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(fallbackEmoji, x, y); }
    }

    // [Keep the rest of your classes here exactly as they were in the previous version: 
    // BossWifiPulse, BossProjectile, DogProjectile, BigDogProjectile, WifiPulse, Chest, Player, FriendEnemy, Gem, Particle, GameLoop etc.]
    // (Note: Since we are keeping the logic the same, I am providing the core structure. When you paste this into your real file, just replace the movement logic in `player.update()` as shown below)

    let player, enemies = [], projectiles = [], gems = [], particles = [], pulses = [], chests = [], bossPulses = [], bossProjectiles = [];
    let gameActive = true, gameTime = 0, spawnTimer = 0, levelUpActive = false, bossTimer = 0, playerScore = 0;
    
    class Player {
        constructor() { this.x = WORLD_WIDTH / 2; this.y = WORLD_HEIGHT / 2; this.radius = 36; this.speed = 3.6; this.hp = 100; this.maxHp = 100; this.level = 1; this.xp = 0; this.nextXp = 10; this.upgrades = { dog: 1, stick: 0, pizza: 0, clock: 0 }; this.timers = { dog: 0 }; }
        update() {
            let currentSpeed = this.speed;
            let dx = 0; let dy = 0;

            // Merge Keyboard and Joystick inputs
            if (keys['w'] || keys['ArrowUp']) dy = -1;
            if (keys['s'] || keys['ArrowDown']) dy = 1;
            if (keys['a'] || keys['ArrowLeft']) dx = -1;
            if (keys['d'] || keys['ArrowRight']) dx = 1;

            if (joystickData.active) {
                dx = joystickData.dx;
                dy = joystickData.dy;
            } else if (dx !== 0 && dy !== 0) { 
                dx *= 0.7071; dy *= 0.7071; // Normalize diagonal movement on keyboard
            }

            this.x += dx * currentSpeed;
            this.y += dy * currentSpeed;
            this.x = Math.max(35, Math.min(WORLD_WIDTH - 35, this.x));
            this.y = Math.max(35, Math.min(WORLD_HEIGHT - 35, this.y));
        }
        draw() { drawSprite(images.player1, "🧑‍🌾", this.x, this.y, 96); }
    }

    function resetGame() {
        player = new Player(); enemies = []; gems = []; gameTime = 0; gameActive = true;
        document.getElementById('gameover-screen').classList.add('hidden');
    }

    function drawHUD() {
        // Simple Joystick visual indicator
        if (joystickData.active) {
            ctx.save(); ctx.setTransform(1, 0, 0, 1, 0, 0); // Reset transform to draw UI on screen
            ctx.beginPath(); ctx.arc(joystickData.startX, joystickData.startY, 50, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,255,255,0.1)"; ctx.fill(); ctx.strokeStyle = "rgba(255,255,255,0.3)"; ctx.stroke();
            ctx.beginPath(); ctx.arc(joystickData.startX + joystickData.dx * 30, joystickData.startY + joystickData.dy * 30, 20, 0, Math.PI*2);
            ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.fill();
            ctx.restore();
        }
    }

    function gameLoop() {
        if (!gameActive) return;
        ctx.fillStyle = "#1e293b"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        
        player.update();
        
        ctx.save();
        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(zoom, zoom);
        ctx.translate(-player.x, -player.y);
        
        // Draw Field
        ctx.fillStyle = "#2d5a1e"; ctx.fillRect(0, 0, WORLD_WIDTH, WORLD_HEIGHT);
        player.draw();
        
        ctx.restore();
        drawHUD();
        requestAnimationFrame(gameLoop);
    }

    resetGame();
    gameLoop();
</script>
</body>
</html>
