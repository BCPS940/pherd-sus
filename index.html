<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Pherd Sus - Crossplay Edition</title>
    <style>
        body {
            margin: 0; padding: 0; background-color: #0d0d0d; color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            overflow: hidden; user-select: none; touch-action: none;
        }

        #ui-container { position: absolute; top: 0; left: 0; width: 100vw; height: 100vh; overflow: hidden; }
        canvas { background-color: #0d0e12; display: block; cursor: crosshair; }

        /* PC Dashboard */
        #dashboard {
            position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
            background: linear-gradient(90deg, rgba(30, 41, 59, 0.9), rgba(15, 23, 42, 0.9));
            border: 2px solid #334155; border-radius: 12px; display: flex;
            justify-content: space-around; align-items: center; padding: 14px 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.8); z-index: 20; backdrop-filter: blur(4px); gap: 20px; white-space: nowrap;
        }

        .key-cap { background-color: #334155; border: 1px solid #475569; border-radius: 4px; padding: 3px 8px; font-weight: bold; color: #f1f5f9; box-shadow: 0 2px 0 #020617; }

        .overlay { position: absolute; top: 0; left: 0; width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.85); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 30; }
        .hidden { display: none !important; }

        h2 { font-size: 32px; color: #ffd700; margin-bottom: 25px; text-shadow: 0 4px 0 #000; text-align: center; padding: 0 15px;}
        
        .btn { background-color: #d32f2f; color: white; border: 2px solid white; padding: 15px 30px; font-size: 20px; font-weight: bold; cursor: pointer; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }

        .choices-container { display: flex; gap: 10px; margin-top: 10px; flex-wrap: wrap; justify-content: center; max-width: 95%; }
        .card { background: linear-gradient(135deg, #1e293b, #0f172a); border: 2px solid #f1c40f; border-radius: 14px; width: 140px; padding: 15px 10px; text-align: center; cursor: pointer; box-shadow: 0 6px 20px rgba(0,0,0,0.6); }
        .card-icon { font-size: 40px; margin-bottom: 5px; }
        .card-title { font-weight: bold; font-size: 14px; margin-bottom: 5px; color: #fff;}
        .card-desc { font-size: 11px; color: #94a3b8; line-height: 1.2; }
    </style>
</head>
<body>

<div id="dashboard">
    <div><span class="key-cap">W</span><span class="key-cap">A</span><span class="key-cap">S</span><span class="key-cap">D</span> <b>Move</b></div>
    <div>🖱️ <b>Scroll:</b> Zoom Camera</div>
    <div>🎮 <b>Crossplay Enabled</b></div>
</div>

<div id="ui-container">
    <div id="gameover-screen" class="overlay hidden">
        <h2 id="gameover-title">Social Battery Fully Drained!</h2>
        <p id="gameover-stats" style="font-size: 18px; margin-bottom: 10px; color: #94a3b8; text-align: center;"></p>
        <p id="gameover-score" style="font-size: 24px; font-weight: bold; margin-bottom: 25px; color: #4ade80;"></p>
        <button class="btn" onclick="resetGame()">Try Re-Isolating</button>
    </div>

    <div id="levelup-screen" class="overlay hidden">
        <h2>🎉 Level Up! Choose an Upgrade 🎉</h2>
        <div class="choices-container" id="choices-box"></div>
    </div>

    <canvas id="gameCanvas"></canvas>
</div>

<script>
    // --- DEVICE DETECTION ---
    const isMobile = /Android|webOS|iPhone|iPad|iPod|BlackBerry|IEMobile|Opera Mini/i.test(navigator.userAgent) || ('ontouchstart' in window) || (navigator.maxTouchPoints > 0);
    if (isMobile) document.getElementById('dashboard').style.display = 'none';

    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    function resizeCanvas() { 
        canvas.width = window.innerWidth; 
        canvas.height = window.innerHeight; 
    }
    window.addEventListener('resize', resizeCanvas); 
    resizeCanvas();

    const WORLD_WIDTH = 10240; 
    const WORLD_HEIGHT = 7680;
    let zoom = 1.0;

    // --- CONTROLS ---
    let keys = {};
    let joystickData = { active: false, id: null, startX: 0, startY: 0, currentX: 0, currentY: 0, dx: 0, dy: 0 };
    let initialPinchDist = null;

    window.addEventListener('keydown', e => keys[e.key] = true);
    window.addEventListener('keyup', e => keys[e.key] = false);

    canvas.addEventListener('wheel', e => {
        e.preventDefault();
        zoom += e.deltaY < 0 ? 0.1 : -0.1;
        zoom = Math.max(0.2, Math.min(2.5, zoom));
    }, { passive: false });

    // Mobile Touch Handlers
    canvas.addEventListener('touchstart', e => {
        e.preventDefault();
        if (e.touches.length === 2) {
            initialPinchDist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
        }
        for (let i = 0; i < e.touches.length; i++) {
            let t = e.touches[i];
            if (!joystickData.active) {
                joystickData.active = true; 
                joystickData.id = t.identifier;
                joystickData.startX = t.clientX; 
                joystickData.startY = t.clientY;
                joystickData.dx = 0; 
                joystickData.dy = 0;
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchmove', e => {
        e.preventDefault();
        if (e.touches.length === 2 && initialPinchDist) {
            let dist = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
            zoom += (dist - initialPinchDist) * 0.005; 
            zoom = Math.max(0.2, Math.min(2.5, zoom));
            initialPinchDist = dist;
        }

        for (let i = 0; i < e.touches.length; i++) {
            let t = e.touches[i];
            if (joystickData.active && t.identifier === joystickData.id) {
                let diffX = t.clientX - joystickData.startX; 
                let diffY = t.clientY - joystickData.startY;
                let dist = Math.hypot(diffX, diffY);
                if (dist > 0) { 
                    joystickData.dx = diffX / dist * Math.min(dist / 60, 1); 
                    joystickData.dy = diffY / dist * Math.min(dist / 60, 1); 
                }
            }
        }
    }, {passive: false});

    canvas.addEventListener('touchend', e => {
        e.preventDefault();
        if (e.touches.length < 2) initialPinchDist = null;
        let stillTouching = false;
        for (let i = 0; i < e.touches.length; i++) if (e.touches[i].identifier === joystickData.id) stillTouching = true;
        if (!stillTouching) { joystickData.active = false; joystickData.id = null; joystickData.dx = 0; joystickData.dy = 0; }
    }, {passive: false});


    // --- IMAGE SYSTEM ---
    const imageFiles = { player1: 'player1', player2: 'player2', player3: 'player3', enemy1: 'friend1', enemy2: 'friend2', enemy3: 'friend3', enemy4: 'friend4', enemy5: 'friend5', boss: 'boss', secretBoss1: 'secretboss1', secretBoss2: 'secretboss2', dog: 'dog', bigdog: 'bigdog', weapon: 'weapon', pizza: 'pizza' };
    const images = {};
    Object.keys(imageFiles).forEach(key => {
        const img = new Image(); img.triedJpg = false; img.src = 'images/' + imageFiles[key] + '.png';
        img.onerror = () => { if (!img.triedJpg) { img.triedJpg = true; img.src = 'images/' + imageFiles[key] + '.jpg'; } };
        images[key] = img;
    });

    function drawSprite(imgElement, fallbackEmoji, x, y, size) {
        if (imgElement && imgElement.complete && imgElement.naturalWidth > 0) ctx.drawImage(imgElement, x - size / 2, y - size / 2, size, size);
        else { ctx.font = `${size}px Arial`; ctx.textAlign = "center"; ctx.textBaseline = "middle"; ctx.fillText(fallbackEmoji, x, y); }
    }

    // --- GAME ENGINE ---
    let player, enemies, projectiles, gems, pulses, chests, bossPulses, bossProjectiles;
    let gameActive = true, gameTime = 0, spawnTimer = 0, levelUpActive = false, bossTimer = 0, playerScore = 0, chestNotifyTimer = 0, chestNotifyText = "";

    function triggerNotify(text, duration = 180) { chestNotifyText = text; chestNotifyTimer = duration; }

    class Player {
        constructor() {
            this.x = WORLD_WIDTH / 2; this.y = WORLD_HEIGHT / 2; this.radius = 36; this.speed = 3.6; this.hp = 100; this.maxHp = 100;
            this.level = 1; this.xp = 0; this.nextXp = 10;
            this.upgrades = { dog: 1, bigdog: 0, stick: 0, coffee: 0, wifi: 0, pizza: 0, shield: 0, magnet: 0, clock: 0 };
            this.timers = { dog: 0, bigdog: 0, wifi: 0 }; this.stickAngle = 0;
        }
        update() {
            let speed = this.speed + (this.upgrades.coffee * 0.5);
            let dx = 0; let dy = 0;

            if (keys['w'] || keys['ArrowUp']) dy = -1; if (keys['s'] || keys['ArrowDown']) dy = 1;
            if (keys['a'] || keys['ArrowLeft']) dx = -1; if (keys['d'] || keys['ArrowRight']) dx = 1;
            
            if (joystickData.active) {
                dx = joystickData.dx; dy = joystickData.dy;
            } else if (dx !== 0 && dy !== 0) { dx *= 0.7071; dy *= 0.7071; } 

            this.x = Math.max(35, Math.min(WORLD_WIDTH - 35, this.x + dx * speed));
            this.y = Math.max(35, Math.min(WORLD_HEIGHT - 35, this.y + dy * speed));

            if (this.upgrades.pizza > 0 && this.hp < this.maxHp) this.hp = Math.min(this.maxHp, this.hp + (0.006 * this.upgrades.pizza));

            let cdMult = Math.max(0.4, 1 - (this.upgrades.clock * 0.08));
